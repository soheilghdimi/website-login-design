<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/milligram/1.4.1/milligram.css">
    <link rel="stylesheet" href="css/style.css">

</head>
<body>

<div class="main-container">

    <div class="login-image"></div>

    <div class="login-inputs">

        <div class="logo-container" style="text-align: center"></div>

        <div style="text-align: center">
            <h2 class="welcome-title">Welcome to lovebirds</h2>
        </div>

        <form class="form-style">
            <label for="username">Username or Email</label>
            <input typeof="text" id="username">

            <label for="password">Password</label>
            <input type="password" id="password">
        </form>

        <a style="text-align: right;color: grey;
        margin-top: 4px;font-size: 1.3rem;">

            <u>Forget password?</u>
        </a>

        <div style="text-align: center">
            <button type="submit" style="width: 40%;
            border-radius: 30px">
                Sign in
            </button>
        </div>

        <div class="or">
            <svg xmlns="http://www.w3.org/2000/svg" x="0px" y="0px"
                 width="70" height="70"
                 viewBox="0 0 172 172"
                 style=" fill:#000000;vertical-align: middle">
                <g fill="none" fill-rule="nonzero" stroke="none" stroke-width="1" stroke-linecap="butt"
                   stroke-linejoin="miter" stroke-miterlimit="10" stroke-dasharray="" stroke-dashoffset="0"
                   font-family="none"  font-size="none"
                   style="mix-blend-mode: normal">
                    <path d="M0,172v-172h172v172z" fill="none"></path>
                    <g fill="#e8d6d6">
                        <path d="M6.88,82.56v6.88h158.24v-6.88z"></path>
                    </g>
                </g>
            </svg>

            <span>or</span>

            <svg xmlns="http://www.w3.org/2000/svg" x="0px" y="0px"
                 width="70" height="70"
                 viewBox="0 0 172 172"
                 style=" fill:#000000;vertical-align: middle">
                <g fill="none" fill-rule="nonzero" stroke="none" stroke-width="1" stroke-linecap="butt"
                   stroke-linejoin="miter" stroke-miterlimit="10" stroke-dasharray="" stroke-dashoffset="0"
                   font-family="none"  font-size="none"
                   style="mix-blend-mode: normal">
                    <path d="M0,172v-172h172v172z" fill="none"></path>
                    <g fill="#e8d6d6">
                        <path d="M6.88,82.56v6.88h158.24v-6.88z"></path>
                    </g>
                </g>
            </svg>
        </div>

        <div class="gmail">
            <img style="vertical-align: middle" src="https://img.icons8.com/color/24/000000/google-logo.png" alt/>
            <span>Sign in with Google</span>
        </div>

        <div class="account">
            <span>New Lovebirds?<u>Create Account</u></span>
        </div>

    </div>

</div>

</body>
</html>
